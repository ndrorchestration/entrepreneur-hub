# SWEEP-EH Automated Reminder Workflow
# Governed by: Agent Amethyst × COLLEEN
# Pattern: P-34 Entrepreneur Hub Flywheel
# Cadence: Runs every Wednesday at 09:00 UTC
# Purpose: Self-issuing SWEEP checkpoint reminder as a GitHub Issue

name: SWEEP-EH Reminder

on:
  schedule:
    # Every Wednesday 09:00 UTC
    - cron: '0 9 * * 3'
  workflow_dispatch:
    inputs:
      sweep_id:
        description: 'SWEEP ID (e.g. SWEEP-EH-003)'
        required: false
        default: 'SWEEP-EH-MANUAL'

jobs:
  create-sweep-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Determine SWEEP ID
        id: sweep_id
        run: |
          # Auto-increment based on date for scheduled runs
          WEEK=$(date +%Y-W%V)
          echo "sweep_label=SWEEP-EH-${WEEK}" >> $GITHUB_OUTPUT
          echo "sweep_date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create SWEEP Reminder Issue
        uses: actions/github-script@v7
        with:
          script: |
            const sweepLabel = '${{ steps.sweep_id.outputs.sweep_label }}';
            const sweepDate = '${{ steps.sweep_id.outputs.sweep_date }}';

            const body = [
              `## ${sweepLabel} — Automated COLLEEN Checkpoint`,
              `**Date:** ${sweepDate}`,
              `**Governed by:** Agent Amethyst × COLLEEN`,
              `**Pattern:** P-34 Entrepreneur Hub Flywheel`,
              '',
              '---',
              '',
              '## COLLEEN Checklist',
              '',
              '### Needle / Distribution',
              '- [ ] T-EH-05 live on Needle?',
              '- [ ] At least one CTA wired to this GitHub repo?',
              '- [ ] NEEDLE_TEMPLATE_INDEX.md links all valid (no 404s)?',
              '- [ ] New templates published since last SWEEP?',
              '',
              '### Flywheel Health',
              '- [ ] P-34 monetization flywheel active?',
              '- [ ] Any Gumroad / revenue CTA updated?',
              '- [ ] Consulting intake form label routing verified?',
              '',
              '### Governance',
              '- [ ] AUDIT_TRAIL.md updated with any changes since last SWEEP?',
              '- [ ] Open GitHub Issues triaged?',
              '- [ ] Any FLAG items from priority queue resolved?',
              '',
              '### Amethyst Review Gate',
              '- [ ] Apogee Lens spot-check on any new templates added this cycle',
              '- [ ] NDR-STASIS window status checked (expires 2026-07-13)',
              '',
              '---',
              '',
              '*Auto-generated by `.github/workflows/sweep-reminder.yml` — close this issue when all checks pass or explicitly defer with a comment.*',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${sweepLabel} — COLLEEN Flywheel Checkpoint — ${sweepDate}`,
              body: body,
              labels: ['sweep', 'governance', 'colleen'],
            });
