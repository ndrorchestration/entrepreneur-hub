name: COLLEEN Weekly SWEEP Reminder
# Fires every Wednesday 9am UTC — forces the governance cadence defined in SWEEP_LOG.md
# Pattern ref: P-33 (SWEEP_LOG), P-34 (Flywheel)
on:
  schedule:
    - cron: '0 9 * * 3'
  workflow_dispatch:

jobs:
  create-sweep-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const sweepNum = `SWEEP-EH-${String(Math.floor(Date.now()/1000)).slice(-4)}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[COLLEEN] Weekly SWEEP due — ${today}`,
              body: [
                `## COLLEEN SWEEP — ${sweepNum}`,
                `**Date:** ${today}  `,
                `**Type:** weekly-colleen  `,
                `**Agent:** COLLEEN  `,
                `**Triggered by:** GitHub Actions cron`,
                ``,
                `### Checklist`,
                `- [ ] Verify all 5 NEEDLE_TEMPLATE_INDEX entries — are any UNRESOLVED stubs now live on Needle?`,
                `- [ ] Check T-EH-05 publish status — if live, update NEEDLE_TEMPLATE_INDEX with real URL`,
                `- [ ] Scan README inquiry path — any new GitHub Issues opened by buyers?`,
                `- [ ] Check MONETIZATION_FLYWHEEL revenue figure — update if changed`,
                `- [ ] Verify Gumroad Enterprise Starter link in README is live (if page created)`,
                `- [ ] Check GitHub repo traffic referral sources (needle.app referrals > 0?)`,
                `- [ ] Update governance/SWEEP_LOG.md with this SWEEP entry`,
                `- [ ] Close this issue when all checks complete`,
                ``,
                `**Escalation rule:** If T-EH-05 UNRESOLVED for >14 days from first flag date, escalate to AUDIT_TRAIL as GOV event.`,
                ``,
                `**Pattern ref:** P-33, P-34`
              ].join('\n'),
              labels: ['colleen-sweep', 'governance']
            });
